<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoRA-SafeLoop Architecture</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@500&display=swap');
        
        body {
            margin: 0;
            padding: 40px;
            background-color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
        }
        
        .diagram-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            overflow: auto;
            max-width: 100%;
        }
        
        svg {
            display: block;
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body>

    <div class="diagram-container">
        <!-- SVG DIAGRAM -->
        <svg width="1300" height="750" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
                <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.06" flood-color="#0f172a"/>
              </filter>
              <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                <path d="M 0 1 L 10 5 L 0 9 z" fill="#334155" />
              </marker>
              <marker id="arrow-dashed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                <path d="M 0 1 L 10 5 L 0 9 z" fill="#64748b" />
              </marker>
            </defs>
            <style>
              text { font-family: 'Inter', -apple-system, sans-serif; }
              .code { font-family: 'Fira Code', monospace; }
              .bg-title { font-weight: 700; font-size: 22px; letter-spacing: 0.5px; }
              .node-title { font-weight: 700; font-size: 16px; fill: #0f172a; }
              .node-sub { font-size: 14px; fill: #475569; }
              .path { fill: none; stroke: #334155; stroke-width: 2.5; stroke-linejoin: round;}
              .path-dashed { fill: none; stroke: #64748b; stroke-width: 2.5; stroke-dasharray: 6 6; stroke-linejoin: round;}
              .label { font-size: 14px; font-weight: 600; fill: #334155; }
              .label-dashed { font-size: 14px; font-weight: 600; fill: #64748b; }
            </style>
          
            <!-- Background Group: Training Environment -->
            <rect x="50" y="50" width="360" height="640" rx="16" fill="#FFFBF0" stroke="#F59E0B" stroke-width="2" stroke-dasharray="8 4" />
            <text x="230" y="90" class="bg-title" fill="#D97706" text-anchor="middle">Training Environment</text>
          
            <!-- Background Group: Agentic Control System -->
            <rect x="700" y="50" width="360" height="640" rx="16" fill="#F0FDFA" stroke="#14B8A6" stroke-width="2" stroke-dasharray="8 4" />
            <text x="880" y="90" class="bg-title" fill="#0D9488" text-anchor="middle">Agentic Control System</text>
          
            <!-- ==================== PATHS & CONNECTIONS ==================== -->
            
            <!-- Applier to Model -->
            <path d="M 230 210 L 230 310" class="path" marker-end="url(#arrow)" />
            
            <!-- Model to Eval -->
            <path d="M 230 410 L 230 510" class="path" marker-end="url(#arrow)" />
            <text x="240" y="465" class="label" stroke="#FFFBF0" stroke-width="5" paint-order="stroke fill">Checkpoint</text>
          
            <!-- Obs to Agent -->
            <path d="M 880 210 L 880 310" class="path" marker-end="url(#arrow)" />
            <text x="890" y="265" class="label" stroke="#F0FDFA" stroke-width="5" paint-order="stroke fill">Structured Prompt</text>
          
            <!-- Eval to Obs (Cross-connection bottom to top-right) -->
            <path d="M 380 580 L 630 580 L 630 185 L 720 185" class="path" marker-end="url(#arrow)" />
            <text x="400" y="570" class="label" stroke="#f8fafc" stroke-width="6" paint-order="stroke fill">Metrics (Refusal Rate &amp; Accuracy)</text>
          
            <!-- Agent to Applier (Cross-connection right to top-left) -->
            <path d="M 730 365 L 480 365 L 480 150 L 390 150" class="path" marker-end="url(#arrow)" />
            <text x="710" y="355" class="label" text-anchor="end" stroke="#f8fafc" stroke-width="6" paint-order="stroke fill">New λ values for all 28 layers</text>

            <!-- Eval to Mem (Cross-connection bottom loop dashed) -->
            <path d="M 230 610 L 230 660 L 880 660 L 880 620" class="path-dashed" marker-end="url(#arrow-dashed)" />
            <text x="555" y="650" class="label-dashed" text-anchor="middle" stroke="#f8fafc" stroke-width="6" paint-order="stroke fill">Grades Outcome</text>
          
            <!-- Mem to Obs (Right side loop) -->
            <path d="M 1030 580 L 1110 580 L 1110 185 L 1040 185" class="path" marker-end="url(#arrow)" />
            <text x="1120" y="375" class="label" stroke="#f8fafc" stroke-width="6" paint-order="stroke fill">Past Outcomes</text>
            <text x="1120" y="395" class="label-dashed" font-weight="normal" stroke="#f8fafc" stroke-width="6" paint-order="stroke fill">(e.g., DEGRADATION)</text>
          
            <!-- Agent to Mem (Right side internal loop) -->
            <path d="M 1030 365 L 1070 365 L 1070 545 L 1040 545" class="path-dashed" marker-end="url(#arrow-dashed)" />
            <text x="1060" y="460" text-anchor="end" class="label-dashed" stroke="#F0FDFA" stroke-width="6" paint-order="stroke fill">Logs λ Decisions</text>
          
            <!-- ==================== NODES ==================== -->
            
            <!-- Constraint Applier -->
            <rect x="80" y="120" width="300" height="90" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)" />
            <g transform="translate(100, 149) scale(1.3)" fill="none" stroke="#0284c7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </g>
            <text x="250" y="155" class="node-title" text-anchor="middle">Constraint Applier</text>
            <text x="250" y="180" class="code node-sub" text-anchor="middle">ΔW_safe = ΔW - λ(ΔW @ P)</text>
          
            <!-- Base Model -->
            <rect x="80" y="320" width="300" height="90" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)" />
            <g transform="translate(100, 349) scale(1.3)" fill="none" stroke="#7c3aed" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
              <polyline points="2 12 12 17 22 12"></polyline>
              <polyline points="2 17 12 22 22 17"></polyline>
            </g>
            <text x="250" y="355" class="node-title" text-anchor="middle">Base Model (Qwen2.5)</text>
            <text x="250" y="380" class="node-sub" text-anchor="middle">+ LoRA Adapters</text>
          
            <!-- Evaluator -->
            <rect x="80" y="520" width="300" height="90" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)" />
            <g transform="translate(100, 549) scale(1.3)" fill="none" stroke="#059669" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="20" x2="18" y2="10"></line>
              <line x1="12" y1="20" x2="12" y2="4"></line>
              <line x1="6" y1="20" x2="6" y2="14"></line>
              <line x1="3" y1="22" x2="21" y2="22"></line>
            </g>
            <text x="250" y="555" class="node-title" text-anchor="middle">Evaluator</text>
            <text x="250" y="580" class="node-sub" text-anchor="middle">(Every 100 Steps)</text>
          
            <!-- Observation Formatter -->
            <rect x="730" y="120" width="300" height="90" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)" />
            <g transform="translate(750, 149) scale(1.3)" fill="none" stroke="#d97706" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </g>
            <text x="900" y="155" class="node-title" text-anchor="middle">Observation Formatter</text>
            <text x="900" y="180" class="node-sub" text-anchor="middle">(Builds Structured Prompt)</text>
          
            <!-- LLM Agent -->
            <rect x="730" y="320" width="300" height="90" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)" />
            <g transform="translate(750, 349) scale(1.3)" fill="none" stroke="#db2777" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="10" rx="2"></rect>
              <circle cx="12" cy="5" r="2"></circle>
              <path d="M12 7v4"></path>
              <line x1="8" y1="16" x2="8" y2="16"></line>
              <line x1="16" y1="16" x2="16" y2="16"></line>
            </g>
            <text x="900" y="355" class="node-title" text-anchor="middle">LLM Agent</text>
            <text x="900" y="380" class="node-sub" text-anchor="middle">(Dual Objective)</text>
          
            <!-- Reflexion Memory -->
            <rect x="730" y="520" width="300" height="90" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)" />
            <g transform="translate(750, 549) scale(1.3)" fill="none" stroke="#4f46e5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <ellipse cx="12" cy="5" rx="9" ry="3"></ellipse>
              <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path>
              <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path>
            </g>
            <text x="900" y="555" class="node-title" text-anchor="middle">Reflexion Memory</text>
            <text x="900" y="580" class="node-sub" text-anchor="middle">(Rolling Outcome Log)</text>
          
        </svg>
    </div>

</body>
</html>
